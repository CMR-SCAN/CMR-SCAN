<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMR Scanner App</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; max-width: 600px; margin: 0 auto; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        .step { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .active-step { display: block; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #34495e; }
        input[type="text"], input[type="number"], input[type="date"], input[type="file"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background-color: #ecf0f1; border: 1px solid #bdc3c7; padding: 8px 5px; font-size: 11px; text-align: center; }
        td { border: 1px solid #bdc3c7; padding: 0; }
        td input[type="number"] { width: 100%; padding: 8px 5px; border: none; text-align: center; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 15px; margin-top: 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div class="container">
        <h1>CMR Document Scanner</h1>

        <form action="https://formspree.io/f/xwvaqgek" method="POST" enctype="multipart/form-data">
            
            <div id="step1" class="step active-step">
                <h2>Stap 1: Upload CMR Foto</h2>
                <p>Selecteer de foto van het CMR document.</p>
                <input type="file" id="cmrPhoto" name="foto" accept="image/*" required>
                <button type="button" onclick="goToManualInput()">Document Toevoegen & Invullen</button>
            </div>

            <div id="step23" class="step">
                <h2>Stap 2: Vul de gegevens in</h2>
                
                <label>Vertreklocatie (Van):</label>
                <input type="text" name="vertreklocatie" placeholder="Bv. Amsterdam">
                
                <label>Aankomstlocatie (Naar):</label>
                <input type="text" name="aankomstlocatie" placeholder="Bv. Naaldwijk">
                
                <label>Hoofdvervoerder:</label>
                <input type="text" name="hoofdvervoerder">

                <label>Ondervervoerder:</label>
                <input type="text" name="ondervervoerder" placeholder="Optioneel">

                <label>Klant:</label>
                <input type="text" name="klant">
                
                <label>Datum gereden:</label>
                <input type="date" id="datumInput" name="datum_gereden">

                <label>Emballage overzicht:</label>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>TAG6</th><th>CC</th><th>DC</th><th>PLATEN</th><th>VSTK</th><th>FLORIS</th><th>FHKAR</th><th>EURO</th><th>WWP</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><input type="number" name="emb_cmr"></td>
                                <td><input type="number" name="emb_cc"></td>
                                <td><input type="number" name="emb_dc"></td>
                                <td><input type="number" name="emb_platen"></td>
                                <td><input type="number" name="emb_vstk"></td>
                                <td><input type="number" name="emb_floris"></td>
                                <td><input type="number" name="emb_fhkar"></td>
                                <td><input type="number" name="emb_euro"></td>
                                <td><input type="number" name="emb_wwp"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <hr style="margin: 30px 0 20px 0; border: 1px solid #eee;">

                <label style="color: #27ae60; font-size: 1.1em;">Prijs van dit transport (€):</label>
                <input type="number" name="prijs" placeholder="0.00" step="0.01">

                <button type="submit" style="background-color: #27ae60;">Bevestig en Mail naar Administratie</button>
            </div>
        </form>
    </div>

    <script>
        function goToManualInput() {
            var fileInput = document.getElementById('cmrPhoto');
            if (fileInput.files.length === 0) {
                alert("Upload a.u.b. eerst een foto van het document.");
                return;
            }

            // Stel datum in
            var vandaag = new Date().toISOString().split('T')[0];
            document.getElementById('datumInput').value = vandaag;

            // Wissel scherm
            document.getElementById('step1').classList.remove('active-step');
            document.getElementById('step23').classList.add('active-step');
        }
    </script>

</body>
</html>
