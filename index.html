<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMR Transport Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 15px; max-width: 600px; margin: 0 auto; }
        .container { background-color: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; font-size: 20px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        
        .step { display: none; }
        .active-step { display: block; }
        
        button { width: 100%; padding: 15px; margin-top: 20px; border-radius: 6px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-next { background-color: #1a73e8; color: white; }
        .btn-copy { background-color: #34a853; color: white; }
        .btn-reset { background-color: #dadce0; color: #3c4043; margin-top: 10px; }

        /* Tabel Styling voor invoer */
        .table-container { overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: #f8f9fa; border: 1px solid #ddd; padding: 8px 4px; font-size: 10px; color: #666; }
        td { border: 1px solid #ddd; padding: 0; }
        td input { padding: 10px 2px; margin: 0; border: none; text-align: center; font-size: 14px; background: transparent; }

        /* Het kopieerbare tekstvak */
        #summary-box { 
            background-color: #fdfdfd; border: 2px solid #1a73e8; padding: 20px; 
            margin-top: 20px; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; 
            font-size: 14px; color: #000; line-height: 1.5; border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CMR Transport Generator</h1>

    <div id="step1" class="step active-step">
        <label>1. Selecteer CMR Foto (als herinnering):</label>
        <input type="file" id="cmrPhoto" accept="image/*">
        <button class="btn-next" onclick="goStep2()">Start met invullen</button>
    </div>

    <div id="step2" class="step">
        <label>Klant:</label>
        <input type="text" id="klant" placeholder="Naam opdrachtgever">
        
        <label>Traject:</label>
        <input type="text" id="traject" placeholder="Van > Naar">

        <label>Datum:</label>
        <input type="date" id="datumInput">

        <label>Emballage Aantallen:</label>
        <div class="table-container">
            <table>
                <tr>
                    <th>TAG6</th><th>CC</th><th>DC</th><th>PLATEN</th><th>VSTK</th><th>FLORIS</th><th>FHKAR</th><th>EURO</th><th>WWP</th>
                </tr>
                <tr>
                    <td><input type="number" id="tag6" value="0"></td>
                    <td><input type="number" id="cc" value="0"></td>
                    <td><input type="number" id="dc" value="0"></td>
                    <td><input type="number" id="platen" value="0"></td>
                    <td><input type="number" id="vstk" value="0"></td>
                    <td><input type="number" id="floris" value="0"></td>
                    <td><input type="number" id="fhkar" value="0"></td>
                    <td><input type="number" id="euro" value="0"></td>
                    <td><input type="number" id="wwp" value="0"></td>
                </tr>
            </table>
        </div>

        <label>Transportprijs (€):</label>
        <input type="number" id="prijs" step="0.01" placeholder="0.00">

        <button class="btn-next" onclick="generateSummary()">Genereer kopieerbaar overzicht</button>
        <button class="btn-reset" onclick="location.reload()">Reset</button>
    </div>

    <div id="step3" class="step">
        <h2 style="font-size: 16px; text-align: center;">Tekst klaar om te kopiëren:</h2>
        <div id="summary-box"></div>
        <button class="btn-copy" onclick="copyToClipboard()">KLIK HIER OM TE KOPIËREN</button>
        <button class="btn-reset" onclick="location.reload()">Nieuwe rit invoeren</button>
    </div>
</div>

<script>
    function goStep2() {
        document.getElementById('datumInput').value = new Date().toISOString().split('T')[0];
        document.getElementById('step1').classList.remove('active-step');
        document.getElementById('step2').classList.add('active-step');
    }

    function generateSummary() {
        const klant = document.getElementById('klant').value || "Niet ingevuld";
        const traject = document.getElementById('traject').value || "Niet ingevuld";
        const datum = document.getElementById('datumInput').value;
        const prijs = document.getElementById('prijs').value || "0.00";

        const tag6 = document.getElementById('tag6').value;
        const cc = document.getElementById('cc').value;
        const dc = document.getElementById('dc').value;
        const platen = document.getElementById('platen').value;
        const vstk = document.getElementById('vstk').value;
        const floris = document.getElementById('floris').value;
        const fhkar = document.getElementById('fhkar').value;
        const euro = document.getElementById('euro').value;
        const wwp = document.getElementById('wwp').value;

        // Formatteer de tekst voor makkelijk kopiëren
        const summary = `TRANSPORT OVERZICHT
---------------------------------
KLANT:      ${klant}
TRAJECT:    ${traject}
DATUM:      ${datum}
PRIJS:      € ${prijs}

EMBALLAGE:
TAG6:       ${tag6}
CC:         ${cc}
DC:         ${dc}
PLATEN:     ${platen}
VSTK:       ${vstk}
FLORIS:     ${floris}
FHKAR:      ${fhkar}
EURO:       ${euro}
WWP:        ${wwp}
---------------------------------`;

        document.getElementById('summary-box').innerText = summary;
        document.getElementById('step2').classList.remove('active-step');
        document.getElementById('step3').classList.add('active-step');
    }

    function copyToClipboard() {
        const text = document.getElementById('summary-box').innerText;
        
        // Gebruik de moderne klembord API
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => {
                showFeedback();
            });
        } else {
            // Fallback voor oudere browsers
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showFeedback();
        }
    }

    function showFeedback() {
        const copyBtn = document.querySelector('.btn-copy');
        const originalText = copyBtn.innerText;
        copyBtn.innerText = "GEKOPIEERD! ✔";
        copyBtn.style.backgroundColor = "#2d8a45";
        
        setTimeout(() => {
            copyBtn.innerText = originalText;
            copyBtn.style.backgroundColor = "#34a853";
        }, 2000);
    }
</script>

</body>
</html>
