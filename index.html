<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMR Scanner & Transport App</title>
    <style>
        /* Opmaak van de App */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; padding: 20px; max-width: 600px; margin: 0 auto; }
        .container { background-color: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; font-size: 24px; text-align: center; margin-bottom: 20px; }
        h2 { color: #2c3e50; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .step { display: none; margin-top: 20px; }
        .active-step { display: block; }
        
        label { font-weight: bold; display: block; margin-top: 15px; color: #5f6368; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="date"], input[type="file"] { 
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }

        /* Emballage Tabel */
        .table-container { overflow-x: auto; margin-top: 15px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background-color: #f8f9fa; border: 1px solid #eee; padding: 10px 5px; font-size: 11px; text-transform: uppercase; color: #70757a; }
        td { border: 1px solid #eee; padding: 0; }
        td input[type="number"] { border: none; text-align: center; padding: 10px 0; background: transparent; }

        /* Knoppen */
        button { 
            background-color: #1a73e8; color: white; border: none; padding: 15px; margin-top: 25px; 
            border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: background 0.3s;
        }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #bdc1c6; cursor: not-allowed; }

        .success-box { text-align: center; padding: 40px 20px; }
        .success-icon { font-size: 50px; color: #34a853; margin-bottom: 20px; }
        #response-msg { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>CMR Transport App</h1>

    <form id="transport-form" action="https://forminit.com/f/o0wdak752fc" method="POST" enctype="multipart/form-data">
        
        <div id="step1" class="step active-step">
            <h2>Stap 1: CMR Document</h2>
            <p>Maak een foto of upload de getekende CMR.</p>
            <input type="file" id="cmrPhoto" name="cmr_bijlage" accept="image/*" required>
            <button type="button" onclick="nextStep()">Bestand toevoegen & Invullen</button>
        </div>

        <div id="step2" class="step">
            <h2>Stap 2: Transportdetails</h2>
            
            <label>Klant / Opdrachtgever:</label>
            <input type="text" name="klant" placeholder="Naam van de klant" required>

            <label>Vertreklocatie (Van):</label>
            <input type="text" name="vertrek_plaats" placeholder="Stad / Regio">
            
            <label>Aankomstlocatie (Naar):</label>
            <input type="text" name="aankomst_plaats" placeholder="Stad / Regio">
            
            <label>Hoofdvervoerder:</label>
            <input type="text" name="vervoerder_1" placeholder="Naam transportbedrijf">

            <label>Ondervervoerder:</label>
            <input type="text" name="vervoerder_2" placeholder="Indien van toepassing">
            
            <label>Datum rit:</label>
            <input type="date" id="datumInput" name="datum_rit">

            <h2>Stap 3: Emballage</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>TAG6</th><th>CC</th><th>DC</th><th>PLATEN</th><th>VSTK</th><th>FLORIS</th><th>FHKAR</th><th>EURO</th><th>WWP</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="number" name="emb_cmr" value="0"></td>
                            <td><input type="number" name="emb_cc" value="0"></td>
                            <td><input type="number" name="emb_dc" value="0"></td>
                            <td><input type="number" name="emb_platen" value="0"></td>
                            <td><input type="number" name="emb_vstk" value="0"></td>
                            <td><input type="number" name="emb_floris" value="0"></td>
                            <td><input type="number" name="emb_fhkar" value="0"></td>
                            <td><input type="number" name="emb_euro" value="0"></td>
                            <td><input type="number" name="emb_wwp" value="0"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <label style="color: #34a853; font-size: 16px;">Afgesproken Prijs (€):</label>
            <input type="number" name="transport_prijs" step="0.01" placeholder="0,00">

            <button type="submit" id="submit-btn" style="background-color: #34a853;">Bevestig en Verzend naar Administratie</button>
            <p id="response-msg"></p>
        </div>
    </form>

    <div id="step3" class="step">
        <div class="success-box">
            <div class="success-icon">✔</div>
            <h2>Succesvol Verzonden!</h2>
            <p>De gegevens en de CMR-foto zijn onderweg naar de administratie.</p>
            <button onclick="window.location.reload()" style="background-color: #5f6368;">Nieuwe CMR invoeren</button>
        </div>
    </div>
</div>

<script>
    // Navigatie tussen stappen
    function nextStep() {
        const fileInput = document.getElementById('cmrPhoto');
        if (fileInput.files.length === 0) {
            alert("Upload a.u.b. eerst een foto van de CMR.");
            return;
        }
        
        // Zet datum standaard op vandaag
        const vandaag = new Date().toISOString().split('T')[0];
        document.getElementById('datumInput').value = vandaag;

        document.getElementById('step1').classList.remove('active-step');
        document.getElementById('step2').classList.add('active-step');
    }

    // Forminit Afhandeling (AJAX)
    const form = document.getElementById('transport-form');
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('response-msg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        btn.disabled = true;
        btn.innerText = 'Bezig met verzenden...';

        const formData = new FormData(form);

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                // Toon succes scherm
                document.getElementById('step2').classList.remove('active-step');
                document.getElementById('step3').classList.add('active-step');
            } else {
                msg.innerText = "Fout bij verzenden. Controleer je verbinding.";
                msg.style.color = "red";
                btn.disabled = false;
                btn.innerText = 'Bevestig en Verzend';
            }
        } catch (error) {
            msg.innerText = "Er is een verbindingsfout opgetreden.";
            msg.style.color = "red";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
